# markdownlint configuration
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# MD013: Line length - disabled (long tables and code blocks make this impractical)
MD013: false

# MD022: Blanks around headings - disabled (project uses dense heading styles in reference docs)
MD022: false

# MD024: Duplicate headings - disabled (each runtime section intentionally repeats Install/Verify/Update/Uninstall)
MD024: false

# MD031: Blanks around fences - disabled (project uses inline code blocks in lists and tables)
MD031: false

# MD032: Blanks around lists - disabled (project style uses lists without surrounding blank lines)
MD032: false

# MD033: Inline HTML - disabled (shield badges and some table formatting use HTML)
MD033: false

# MD036: Emphasis as heading - disabled (README uses bold text as decorative captions, not headings)
MD036: false

# MD058: Blanks around tables - disabled (project places tables adjacent to headings and content)
MD058: false

# MD060: Table column style - disabled (project uses both compact and aligned table styles)
MD060: false
